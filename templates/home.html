<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
</head>
<body>
<form action="{{ url_for('home') }}" method="GET">
    <select name="sort" id="sort">
        <option value="" disabled selected>-- Sort by --</option>
        <option value="title">Title</option>
        <option value="author">Author</option>
        <option value="year">Publication Year</option>
    </select>

    <select name="direction" id="direction">
        <option value="" disabled selected>-- Direction --</option>
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>

    <button type="submit">Get Books</button>
</form>

<hr>
{% if not books %}
<p>No Books in database!</p>
{% else %}
{% for book in books %}
<div class="book-card">
    <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg" alt="Cover von {{ book.title }}">

    <h3>{{ book.title }}</h3>

    <p><strong>Autor:</strong> {{ book.author.name }}</p>

    <p><small>Erschienen: {{ book.publication_year }}</small></p>
</div>
{% endfor %}
{% endif %}
</body>
</html>
