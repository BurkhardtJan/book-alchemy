<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<form action="{{ url_for('home') }}" method="GET">
    <select name="sort" id="sort">
        <option value="" disabled selected>-- Sort by --</option>
        <option value="title">Title</option>
        <option value="author">Author</option>
        <option value="year">Publication Year</option>
    </select>

    <select name="direction" id="direction">
        <option value="" disabled selected>-- Direction --</option>
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>

    <button type="submit">Get Books</button>
    <hr>
    <input type="text" name="search_book_title" placeholder="Search by title">
    <input type="text" name="search_book_author" placeholder="Search by author">
    <input type="text" name="search_book_year" placeholder="Search by year">
    <button type="submit">Find Books</button>

</form>
<hr>
<form action="/add_author" method="POST">
    <label for="name">Author Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="birthdate">Birthdate:</label>
    <input type="date" id="birthdate" name="birthdate" required><br><br>
    <label for="date_of_death">Date of Death:</label>
    <input type="date" id="date_of_death" name="date_of_death"><br><br>
    <input type="submit" value="Add Author">
</form>

<div>{{ success_message }}</div>

</body>
</html>
